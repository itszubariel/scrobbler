<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>adding scrobbler to your server...</title>
    <link
      rel="icon"
      type="image/png"
      href="/assets/images/scrobbler_logo.png"
    />
    <meta
      name="description"
      content="redirecting you to add scrobbler to your discord server."
    />
    <meta property="og:title" content="add scrobbler to discord" />
    <meta property="og:description" content="a social music bot for discord." />
    <meta
      property="og:image"
      content="https://scrobbler.netlify.app/assests/images/scrobbler_logo.png"
    />
    <meta property="og:site_name" content="scrobbler" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --color-paper: #f1f0e3;
        --color-charcoal: #2e2e2e;
        --color-mist: #e5e7eb;
        --purple-start: #6040b0;
        --purple-end: #9468d8;
        --gradient: linear-gradient(
          135deg,
          var(--purple-start),
          var(--purple-end)
        );
        --font-display: "Cormorant Garamond", serif;
        --font-body: "Bricolage Grotesque", sans-serif;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
      }
      body {
        background: var(--color-paper);
        color: var(--color-charcoal);
        font-family: var(--font-body);
        font-size: 16px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        transition:
          background-color 0.3s ease,
          color 0.3s ease;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.025;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        background-size: 200px 200px;
      }
      a {
        color: inherit;
        text-decoration: none;
      }

      /* ── Motion system (page load) ── */
      body {
        opacity: 0;
        transition: opacity 0.55s ease;
      }
      body.is-loaded {
        opacity: 1;
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translate3d(0, 18px, 0);
        }
        to {
          opacity: 1;
          transform: translate3d(0, 0, 0);
        }
      }
      @keyframes floaty {
        0% {
          transform: translate3d(0, 0, 0);
        }
        50% {
          transform: translate3d(0, -10px, 0);
        }
        100% {
          transform: translate3d(0, 0, 0);
        }
      }
      [data-animate] {
        opacity: 0;
        transform: translate3d(0, 18px, 0);
        will-change: opacity, transform;
      }
      [data-animate].is-visible {
        animation: fadeUp 0.85s cubic-bezier(0.2, 0.8, 0.2, 1) both;
        animation-delay: var(--d, 0ms);
      }
      .bg-orbs {
        position: fixed;
        inset: -20vh -20vw;
        z-index: 0;
        pointer-events: none;
        overflow: hidden;
      }
      body > :not(.bg-orbs) {
        position: relative;
        z-index: 1;
      }
      .bg-orbs span {
        position: absolute;
        width: min(520px, 42vw);
        height: min(520px, 42vw);
        border-radius: 999px;
        filter: blur(40px);
        opacity: 0.22;
        background: radial-gradient(
          circle at 30% 30%,
          rgba(148, 104, 216, 0.95),
          rgba(96, 64, 176, 0) 60%
        );
        animation: floaty 7.5s ease-in-out infinite;
        mix-blend-mode: multiply;
      }
      .bg-orbs span:nth-child(1) {
        top: 6vh;
        left: 6vw;
        animation-duration: 10.5s;
      }
      .bg-orbs span:nth-child(2) {
        top: 28vh;
        right: 10vw;
        width: min(640px, 54vw);
        height: min(640px, 54vw);
        opacity: 0.18;
        animation-duration: 12.5s;
        animation-delay: -2s;
      }
      .bg-orbs span:nth-child(3) {
        bottom: 6vh;
        left: 18vw;
        width: min(580px, 48vw);
        height: min(580px, 48vw);
        opacity: 0.16;
        animation-duration: 13.5s;
        animation-delay: -4s;
      }
      @media (prefers-reduced-motion: reduce) {
        body {
          transition: none;
          opacity: 1;
        }
        [data-animate] {
          opacity: 1 !important;
          transform: none !important;
          animation: none !important;
        }
        .bg-orbs span {
          animation: none !important;
        }
      }

      .invite-page {
        text-align: center;
        padding: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }
      .invite-page__wordmark {
        font-family: var(--font-display);
        font-style: italic;
        font-size: clamp(56px, 12vw, 96px);
        font-weight: 600;
        letter-spacing: -0.01em;
        background: var(--gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 16px;
        display: block;
      }
      .invite-page__sub {
        font-size: 18px;
        font-weight: 500;
        opacity: 0.65;
        margin-bottom: 40px;
        text-transform: lowercase;
      }

      /* Spinner */
      .spinner {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 3px solid rgba(96, 64, 176, 0.15);
        border-top-color: var(--purple-start);
        animation: spin 0.9s linear infinite;
        margin-bottom: 32px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .invite-page__status {
        font-size: 13px;
        opacity: 0.45;
        margin-bottom: 20px;
        text-transform: lowercase;
      }
      .invite-page__fallback {
        font-size: 13px;
        opacity: 0.5;
        text-transform: lowercase;
      }
      .invite-page__fallback a {
        color: var(--purple-start);
        text-decoration: underline;
        text-underline-offset: 3px;
        transition: opacity 0.2s;
      }
      .invite-page__fallback a:hover {
        opacity: 0.75;
      }

      /* Dark mode */
      [data-theme="dark"] {
        --color-paper: #1f1f1f;
        --color-charcoal: #d1d0c0;
        --color-mist: rgba(255, 255, 255, 0.08);
        --purple-start: #8b6fd4;
        --purple-end: #b89af0;
      }
    </style>
    <script>
      (function () {
        var saved = localStorage.getItem("theme");
        var prefersDark = window.matchMedia(
          "(prefers-color-scheme: dark)",
        ).matches;
        if (saved === "dark" || (!saved && prefersDark)) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();
    </script>
  </head>
  <body>
    <div class="bg-orbs" aria-hidden="true">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <div class="invite-page">
      <span class="invite-page__wordmark" data-animate style="--d: 80ms"
        >scrobbler</span
      >
      <p class="invite-page__sub" data-animate style="--d: 160ms">
        adding scrobbler to your server
      </p>
      <div class="spinner" aria-hidden="true" data-animate style="--d: 240ms"></div>
      <p class="invite-page__status" data-animate style="--d: 320ms">
        redirecting you to discord...
      </p>
      <p class="invite-page__fallback" data-animate style="--d: 400ms">
        not redirected?
        <a
          href="https://discord.com/oauth2/authorize?client_id=1493297305275863120&permissions=2147600384&integration_type=0&scope=bot+applications.commands"
        >
          click here
        </a>
      </p>
    </div>

    <script>
      window.addEventListener("DOMContentLoaded", function () {
        document.body.classList.add("is-loaded");
        document.querySelectorAll("[data-animate]").forEach(function (el) {
          el.classList.add("is-visible");
        });
      });

      var INVITE_URL =
        "https://discord.com/oauth2/authorize?client_id=1493297305275863120&permissions=2147600384&integration_type=0&scope=bot+applications.commands";
      setTimeout(function () {
        window.location.href = INVITE_URL;
      }, 2000);
    </script>
  </body>
</html>
